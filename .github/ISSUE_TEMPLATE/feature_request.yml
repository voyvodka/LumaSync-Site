name: Site content or feature request
description: Something the site is missing — a doc, a comparison, a page, an improvement.
title: '[site-feat] '
labels: ['enhancement', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        **Scope**: use this for requests about **lumasync.app** — new docs,
        missing comparisons, UX improvements, a11y additions, translations.

        For **app features** (new capture modes, new devices, UI changes in
        the desktop app), file against the
        [app repo](https://github.com/voyvodka/LumaSync/issues/new/choose).

  - type: textarea
    id: what
    attributes:
      label: What's missing or would help?
      description: Describe the change — page, content, behavior — in plain language.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why?
      description: Who benefits, and what problem does it solve? (Even a short "I got lost looking for X" is useful.)
    validations:
      required: false

  - type: textarea
    id: refs
    attributes:
      label: References
      description: Links to similar pages elsewhere, screenshots, related issues.
    validations:
      required: false
