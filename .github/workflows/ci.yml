name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + lhci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Third-party Actions pinned to commit SHAs to defeat tag repointing
      # (supply-chain). Dependabot keeps the version comments current.
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: License audit (fail on strict copyleft in prod deps)
        # MIT-licensed project can't ship strict copyleft in its
        # redistributed dependency tree. Blocks GPL* / AGPL* / SSPL /
        # unknown-or-missing licenses. LGPL* is permitted — it's
        # weak-copyleft and the LGPL deps we have (sharp's libvips
        # prebuilt binary) run at build time only, they don't ship in
        # the final static bundle, so LGPL's linking clause is
        # satisfied. WTFPL is permissive despite the name and is also
        # allowed. Dev deps are excluded — tooling copyleft is fine.
        run: |
          LICENSES=$(pnpm licenses list --prod --long --json 2>&1)
          echo "$LICENSES" | grep -oE '"license":\s*"[^"]*"' | sort -u | head -30
          if echo "$LICENSES" | grep -iE '"license":\s*"(A?GPL-[^"]*|SSPL[^"]*|UNKNOWN|UNLICENSED)"'; then
            echo "::error::Strict copyleft or unknown license found in production dependencies."
            exit 1
          fi

      - name: Lint (prettier --check)
        run: pnpm lint

      # Astro + TypeScript + zod content schema check. Runs before build
      # so type regressions fail fast without waiting for the full bundle.
      - name: Type check (astro check)
        run: pnpm check

      - name: Build
        run: pnpm build

      # Enforces the a11y budget from .thinking/02-website.md § #14.
      # accessibility >= 0.95 is hard-fail; perf/best-practices/seo are warn.
      - name: Lighthouse CI
        run: pnpm dlx @lhci/cli@latest autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks can scan every commit, not just HEAD.
          # Without fetch-depth: 0 the scan misses credentials introduced
          # in older commits that were never reverted.
          fetch-depth: 0

      # Pinned release binary instead of an Action to avoid a third-party
      # Action in the trust boundary for something this privilege-sensitive.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --no-banner --redact --verbose
