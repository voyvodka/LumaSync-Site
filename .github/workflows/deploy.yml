name: deploy

# Manual-only trigger until Hetzner secrets are configured.
# Once DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY are set in repo secrets
# and Hetzner is provisioned, re-enable the `push: branches: [main]` trigger
# so every merged commit ships automatically.
on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Third-party Actions pinned to commit SHAs to defeat tag repointing
      # (supply-chain). Dependabot keeps the version comments current.
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Enforces the a11y budget from .thinking/02-website.md § #14.
      # accessibility >= 0.95 is hard-fail; perf/best-practices/seo are warn.
      - name: Lighthouse CI
        run: pnpm dlx @lhci/cli@latest autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Deploy to Hetzner
        uses: burnett01/rsync-deployments@66257cad6bfeb2171d3b6bfa6c9a22279dd9c3a1 # v8.0.5
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /var/www/lumasync.app/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
