name: deploy

# Deploys the built Astro site to Cloudflare Pages on every push to
# main. Manual dispatch available for forcing a redeploy from any commit.
#
# Required repo secrets:
#   - CLOUDFLARE_API_TOKEN  (Pages:Edit + Zone:Read)
#   - CLOUDFLARE_ACCOUNT_ID

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          # Full history so vendor/lumasync CHANGELOG parsing picks up
          # the right dated release tag for LATEST_VERSION interpolation.
          fetch-depth: 0

      # Third-party Actions pinned to commit SHAs to defeat tag-repointing
      # supply-chain attacks. Dependabot keeps the version comments current.
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (prettier --check)
        run: pnpm lint

      - name: Type check (astro check)
        run: pnpm check

      - name: Build
        env:
          PUBLIC_SITE_STAGE: ${{ vars.PUBLIC_SITE_STAGE || 'beta' }}
        run: pnpm build

      # wrangler-action uses the repo secrets for auth; commit SHA is
      # attached so the Cloudflare Dashboard's deployment history links
      # to the matching git commit. --commit-message is intentionally
      # omitted — the action's `command` input is split on whitespace
      # (not shell-escaped), and any commit message that contains dashes
      # (like a `--write` flag substring) gets parsed as extra wrangler
      # arguments. The hash alone is enough; Dashboard resolves the
      # message from GitHub via the commit link.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: pages deploy dist --project-name=lumasync-site-beta --branch=main --commit-hash=${{ github.sha }}
