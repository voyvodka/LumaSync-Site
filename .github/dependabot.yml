# Dependabot configuration aligned with
# .thinking/02-website.md § Stack Decisions > #0 Dependency policy:
# default to latest stable, no pre-releases, weekly sweep cadence.
#
# Note: the `vendor/lumasync` git submodule is intentionally NOT tracked
# by Dependabot. Submodule refs are bumped manually on every app release
# after a human review pass (per .thinking/02-website.md § #3).
#
# Pre-release handling: Dependabot does not open PRs for pre-release
# versions unless the package is already on a pre-release track, so the
# "latest stable, no pre-releases" policy is satisfied by the default
# behaviour — no explicit ignore rule is required (and `semver-prerelease`
# is not a valid `update-types` value anyway).

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - npm
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - ci
