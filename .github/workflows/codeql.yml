name: codeql

# Semantic code analysis for JavaScript/TypeScript. Runs on every PR
# against main, every push to main, and weekly as a baseline sweep so
# newly-disclosed rules catch regressions even without code churn.
# Results land in the repo's Security → Code scanning tab.

# Push, PR, and weekly-schedule triggers are commented out until the
# repo's "Code scanning" feature is enabled in
# Settings → Security → Code security and analysis. Without that toggle
# CodeQL's analyze step succeeds but the SARIF upload returns HTTP 403
# ("Code scanning is not enabled"), failing the run on every push and
# polluting commit-status checks. Once the toggle is on, restore the
# triggers below to resume automatic scans.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  # schedule:
  #   - cron: '0 3 * * 1'  # Mondays 03:00 UTC = 06:00 Europe/Istanbul

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-and-quality adds non-security lint-style queries
          # (complexity, dead code) on top of the default security set.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
