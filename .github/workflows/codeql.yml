name: codeql

# Semantic code analysis for JavaScript/TypeScript. Runs on every PR
# against main, every push to main, and weekly as a baseline sweep so
# newly-disclosed rules catch regressions even without code churn.
# Results land in the repo's Security → Code scanning tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 Europe/Istanbul (03:00 UTC) — matches the
    # Dependabot sweep so security + deps reviews land the same day.
    - cron: '0 3 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality adds non-security lint-style queries
          # (complexity, dead code) on top of the default security set.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
