name: deploy

# Deploys the built Astro site to the Cloudflare Pages project
# `lumasync-site-beta` (custom domain: beta.lumasync.app). On every push
# to main the site rebuilds in beta stage (PUBLIC_SITE_STAGE=beta →
# global noindex) and the new deployment becomes the production alias
# for the beta project. Manual dispatch available for forcing a redeploy
# from any commit. Production apex (lumasync.app / www.lumasync.app) is
# still served by the separate coming-soon Worker and gets cut over via
# a Dashboard step when the content review wraps up.
#
# Required repo secrets:
#   - CLOUDFLARE_API_TOKEN  (Pages:Edit on the account + Zone:Read on lumasync.app)
#   - CLOUDFLARE_ACCOUNT_ID (— [REDACTED])

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-beta:
    name: Deploy beta.lumasync.app
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          # Full history so vendor/lumasync CHANGELOG parsing picks up
          # the right dated release tag for LATEST_VERSION interpolation.
          fetch-depth: 0

      # Third-party Actions pinned to commit SHAs to defeat tag-repointing
      # supply-chain attacks. Dependabot keeps the version comments current.
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (prettier --check)
        run: pnpm lint

      - name: Type check (astro check)
        run: pnpm check

      - name: Build (beta stage — global noindex)
        env:
          PUBLIC_SITE_STAGE: beta
        run: pnpm build

      # wrangler-action uses the repo secrets for auth; commit SHA is
      # attached so the Cloudflare Dashboard's deployment history links
      # to the matching git commit. --commit-message is intentionally
      # omitted — the action's `command` input is split on whitespace
      # (not shell-escaped), and any commit message that contains dashes
      # (like a `--write` flag substring) gets parsed as extra wrangler
      # arguments. The hash alone is enough; Dashboard resolves the
      # message from GitHub via the commit link.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: pages deploy dist --project-name=lumasync-site-beta --branch=main --commit-hash=${{ github.sha }}
