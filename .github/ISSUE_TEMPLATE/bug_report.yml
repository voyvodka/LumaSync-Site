name: Site bug report
description: Something on lumasync.app is broken, wrong, or inaccessible.
title: '[site] '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        **Scope**: this template is for issues with the **site itself** —
        broken links, rendering glitches, missing pages, a11y regressions,
        incorrect copy or stale docs.

        For **desktop-app** bugs (firmware, USB, Hue streaming, UI crashes),
        please file against the [app repo](https://github.com/voyvodka/LumaSync/issues/new/choose) instead.

  - type: input
    id: page
    attributes:
      label: Page URL
      description: The page where you saw the issue.
      placeholder: https://lumasync.app/docs/…
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect to see instead?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: e.g. Safari 17 on macOS 14, Firefox 124 on Ubuntu 24.04
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Screenshots or console output
      description: Drag images here, or paste `console.log` errors.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: This is a site bug, not a desktop-app bug.
          required: true
